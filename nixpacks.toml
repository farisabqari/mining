[providers]
php = true
node = true

[phases.setup]
nixPkgs = ["php82", "php82Extensions.mysql", "php82Extensions.pdo", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.curl", "php82Extensions.gd", "php82Extensions.zip", "php82Extensions.bcmath", "composer", "nodejs_20"]

[phases.install]
cmds = ["composer install --no-interaction --prefer-dist", "npm ci"]

[phases.build]
cmds = ["npm run build", "php artisan storage:link"]

[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
